<!-- Menu button -->
<button
  type="button"
  (click)="toggleDrawer()"
  class="fixed top-4 left-4 z-50 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg shadow-lg"
>
  ☰
</button>

<!-- Backdrop -->
<div
  *ngIf="isDrawerOpen"
  class="fixed inset-0 bg-black/50 z-40"
  (click)="closeDrawer()"
></div>

<!-- Side drawer -->
<div
  class="fixed top-0 left-0 h-full w-72 bg-gray-900 text-white z-50 shadow-2xl transform transition-transform duration-300"
  [class.translate-x-0]="isDrawerOpen"
  [class.-translate-x-full]="!isDrawerOpen"
>
  <div class="flex flex-col h-full p-6 pb-24">
    <div class="text-2xl font-bold mb-8">LifeRPG</div>

    <!-- Buttons -->
    <div class="flex-1 flex flex-col gap-3">
      <button routerLink="/dashboard" class="text-left px-3 py-2 rounded hover:bg-gray-800">
        🏠 Dashboard
      </button>
      <button
            routerLink="/characters"
            class="text-left px-3 py-2 rounded hover:bg-gray-800"
          >
            🎭 Characters
      </button>
      <button routerLink="/statistics" class="text-left px-3 py-2 rounded hover:bg-gray-800">
        📊 Statistics
      </button>
      <button routerLink="/achievements" class="text-left px-3 py-2 rounded hover:bg-gray-800">
        🏅 Achievements
      </button>
    </div>

    <button
      type="button"
      (click)="logout()"
      class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg"
    >
      Logout
    </button>
  </div>
</div>
<!--End of Side drawer -->


<!--Start of characters page -->
<div class="min-h-screen bg-gray-900 text-white p-8">
  <h1 class="text-3xl font-bold mb-6 text-center">🎭 Characters 🎭</h1>

  <!-- Character Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <div
      *ngFor="let character of characters"
      (click)="character.isUnlocked && selectCharacter(character.id)"
      class="bg-gray-800 rounded-2xl p-6 transition"
      [class.hover:bg-gray-700]="character.isUnlocked"
      [class.cursor-pointer]="character.isUnlocked"
      [class.opacity-50]="!character.isUnlocked"
      [class.ring-2]="character.isActive"
      [class.ring-green-500]="character.isActive"
    >

      <!-- Emoji -->
      <div class="text-6xl mb-4 text-center">
        {{ character.characterEmoji }}
      </div>

      <!-- Name -->
      <h2 class="text-xl font-bold text-center mb-2">
        {{ character.characterName }}
      </h2>

      <!-- Unlock State -->
      <div
        class="text-center font-semibold mb-2"
        [class.text-green-400]="character.isUnlocked"
        [class.text-red-400]="!character.isUnlocked"
      >
        {{ character.isUnlocked ? 'Unlocked' : 'Locked' }}
      </div>

      <div
        *ngIf="!character.isUnlocked"
        class="text-center text-sm text-gray-300 mb-4"
      >
        Unlock at Life Level {{ character.unlockLevel }}
      </div>

      <div
        *ngIf="character.isActive"
        class="text-center text-green-400 font-bold mb-2"
      >
        ACTIVE
      </div>

      <!-- Progress Bar -->
      <div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden mb-2">

        <div
          class="bg-blue-500 h-4 transition-all duration-300"
          [style.width.%]="getXPPercent(character.currentXP, character.level)"
        ></div>

      </div>

      <!-- XP Text -->
      <div class="text-center text-sm text-gray-300 mb-2">
        {{ character.currentXP }} /
        {{ getRequiredXP(character.level) }} XP
      </div>

      <!-- Level -->
      <div class="text-center text-sm text-gray-300">
        Level {{ character.level }}
      </div>

    </div>

  </div>
</div>
