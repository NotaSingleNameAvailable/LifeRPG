<div class="min-h-screen bg-gray-900 text-white p-8">

  <!-- ===================================================== -->
  <!-- MAIN CARD CONTAINER -->
  <!-- ===================================================== -->
  <div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">


    <!-- ===================================================== -->
    <!-- HEADER (Back button + Title) -->
    <!-- ===================================================== -->
    <div class="flex items-center justify-between mb-6">

      <button
        type="button"
        (click)="goBack()"
        class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-semibold"
      >
        ← Back
      </button>

      <h1 class="text-2xl font-bold">
        {{ isEditMode ? 'Edit Task' : 'Create Task' }}
      </h1>

      <div class="w-[88px]"></div>
    </div>


    <!-- ===================================================== -->
    <!-- FORM FIELDS SECTION -->
    <!-- ===================================================== -->
    <div class="grid gap-4">


      <!-- ========================= -->
      <!-- TASK TITLE -->
      <!-- ========================= -->
      <input
        [(ngModel)]="taskForm.title"
        name="title"
        placeholder="Task title"
        class="p-3 rounded bg-gray-700 text-white border-2"

       
        
        [class.border-red-500]="isTitleInvalid()"
        [class.border-gray-600]="!isTitleInvalid()"
      />


      <!-- ========================= -->
      <!-- DESCRIPTION -->
      <!-- ========================= -->
      <textarea
        [(ngModel)]="taskForm.description"
        name="description"
        placeholder="Description (optional)"
        class="p-3 rounded bg-gray-700 text-white"
        rows="4"
      ></textarea>


      <!-- ========================= -->
      <!-- CATEGORY SELECT -->
      <!-- ========================= -->
      <select
        [(ngModel)]="taskForm.categoryId"
        name="categoryId"
        
        class="p-3 rounded bg-gray-700 text-white border-2"
        [class.border-red-500]="isCategoryInvalid()"
        [class.border-gray-600]="!isCategoryInvalid()"
      >
        <option value="">Select category</option>
        <option *ngFor="let category of categories" [value]="category.id">
          {{ category.name }}
        </option>
      </select>


      <!-- ========================= -->
      <!-- RECURRENCE SELECT -->
      <!-- ========================= -->
      <select
        [(ngModel)]="taskForm.recurrencePattern"
        name="recurrencePattern"
        class="p-3 rounded bg-gray-700 text-white"
      >
        <option value="">No recurrence</option>
        <option value="daily">Daily</option>
        <option value="custom">Custom</option>
      </select>


      <!-- ===================================================== -->
      <!-- DIFFICULTY SYSTEM -->
      <!-- ===================================================== -->
      <div class="mt-4">

        <!-- Difficulty label -->
        <div class="text-sm text-gray-300 mb-2">
          Select Difficulty
        </div>

        <!-- Difficulty buttons -->
        <div class="flex gap-2">

          <button
            type="button"
            (click)="setDifficulty('easy')"
            [class.bg-green-600]="taskForm.difficulty==='easy'"
            class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded"
          >
            Easy
          </button>

          <button
            type="button"
            (click)="setDifficulty('medium')"
            [class.bg-yellow-600]="taskForm.difficulty==='medium'"
            class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded"
          >
            Medium
          </button>

          <button
            type="button"
            (click)="setDifficulty('hard')"
            [class.bg-orange-600]="taskForm.difficulty==='hard'"
            class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded"
          >
            Hard
          </button>

          <button
            type="button"
            (click)="setDifficulty('insane')"
            [class.bg-red-600]="taskForm.difficulty==='insane'"
            class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded"
          >
            Insane
          </button>

        </div>


        <!-- ===================================================== -->
        <!-- LIVE XP / LP PREVIEW -->
        <!-- ===================================================== -->
        <div class="mt-3 text-sm text-gray-300">
          XP:
          <span class="text-white font-bold">
            {{ xpValue }}
          </span>

          |

          LP:
          <span class="text-white font-bold">
            {{ previewLP }}
          </span>
        </div>

      </div>


      <!-- ===================================================== -->
      <!-- ACTION BUTTONS -->
      <!-- ===================================================== -->
      <div class="flex flex-wrap gap-3 pt-2">

        <!-- SAVE BUTTON -->
        <button
          type="button"
          (click)="saveTask()"

          class="bg-blue-600 hover:bg-blue-700 px-5 py-3 rounded-lg font-bold transition"

          [disabled]="isFormInvalid()"
          [class.opacity-50]="isFormInvalid()"
          [class.cursor-not-allowed]="isFormInvalid()"
        >
          Save Task
        </button>


        <!-- DELETE BUTTON (ONLY IN EDIT MODE) -->
        <button
          *ngIf="isEditMode"
          type="button"
          (click)="deleteTask()"
          class="bg-red-600 hover:bg-red-700 px-5 py-3 rounded-lg font-bold"
        >
          Delete Task
        </button>

      </div>

    </div>
  </div>
</div>
