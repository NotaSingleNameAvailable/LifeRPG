<div class="relative flex items-center justify-center min-h-screen bg-gray-900 text-white">
  <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <form (ngSubmit)="login()">
      <input
        type="text"
        placeholder="Username"
        class="w-full mb-4 p-3 rounded bg-gray-700"
        [(ngModel)]="username"
        name="username"
        autocomplete="username"
      />

      <input
        type="password"
        placeholder="Password"
        class="w-full mb-6 p-3 rounded bg-gray-700"
        [(ngModel)]="password"
        name="password"
        autocomplete="current-password"
      />

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold"
      >
        Login
      </button>
    </form>
  </div>

  <button
    type="button"
    (click)="goToRegister()"
    class="absolute bottom-4 right-4 bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg shadow-lg"
  >
    Switch to register page
  </button>
</div>
