<div class="relative flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="space-y-4">
      <div>
        <label class="block text-gray-700">Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="user.username"
          required
          class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="user.email"
          required
          class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700">Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="user.password"
          required
          class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition disabled:opacity-50"
      >
        Register
      </button>

      <p *ngIf="message" class="text-center text-sm mt-3 text-green-600">
        {{ message }}
      </p>
    </form>
  </div>

  <button
    type="button"
    (click)="goToLogin()"
    class="absolute bottom-4 right-4 bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg shadow-lg"
  >
    Switch to login page
  </button>
</div>
